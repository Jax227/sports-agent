# Streamlit Community Cloud 部署配置
#
# 本地开发: 此文件可留空，app 会自动使用 SQLite
# Streamlit Cloud: 在 Dashboard → Settings → Secrets 中配置以下变量
#
# ── PostgreSQL 数据库 (数据持久化) ───────────────────────
# 免费 Supabase: https://supabase.com → New Project → Settings → Database → Connection String
# 格式: postgresql://postgres:<PASSWORD>@<HOST>:6543/postgres
#
# DATABASE_URL = "postgresql://postgres:YOUR_PASSWORD@db.xxxxx.supabase.co:6543/postgres"
#
# ── 文献检索邮箱 (可选, 提升 API 速率限制) ────────────
# ENTREZ_EMAIL = "your_email@example.com"
#
# ── 语义搜索 API (可选) ──────────────────────────────────
# SEMANTIC_SCHOLAR_API_KEY = ""
